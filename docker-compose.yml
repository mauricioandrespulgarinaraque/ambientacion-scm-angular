version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ambientacion2-postgres
    environment:
      POSTGRES_DB: ambientacion2
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ambientacion2"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: ambientacion2-backend
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/ambientacion2
      CORS_ORIGINS: http://frontend:3000
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: ambientacion2-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
