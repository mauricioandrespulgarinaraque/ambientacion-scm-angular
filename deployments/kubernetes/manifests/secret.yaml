apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: ambientacion2
  labels:
    app: postgres
type: Opaque
data:
  # base64 encoded values
  # admin | base64 = YWRtaW4=
  # password123 | base64 = cGFzc3dvcmQxMjM=
  POSTGRES_USER: YWRtaW4=
  POSTGRES_PASSWORD: cGFzc3dvcmQxMjM=
  POSTGRES_DB: YW1iaWVudGFjaW9uMg==
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: ambientacion2
  labels:
    app: backend
type: Opaque
data:
  # DATABASE_URL=postgresql://admin:password123@postgres:5432/ambientacion2
  DATABASE_URL: cG9zdGdyZXNxbDovL2FkbWluOnBhc3N3b3JkMTIzQHBvc3RncmVzOjU0MzIvYW1iaWVudGFjaW9uMg==
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ambientacion2
  labels:
    app: backend
data:
  CORS_ORIGINS: "http://localhost:3000,http://localhost:80"
  LOG_LEVEL: "INFO"
